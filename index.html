<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>نظام ديار</title>
<style>
body{font-family:Tahoma;background:#f5f7fb;padding:20px}
.card{background:#fff;padding:20px;border-radius:15px;margin-bottom:15px}
button{padding:10px;border:none;border-radius:10px;background:#111;color:#fff;cursor:pointer;margin:4px}
input{padding:10px;width:100%;margin:5px 0}
</style>
</head>
<body>

<div class="card">
<h3>تسجيل جديد / Register</h3>
<input id="name" placeholder="الاسم">
<input id="email" placeholder="البريد الإلكتروني">
<input id="pass" type="password" placeholder="كلمة المرور">
<button onclick="register()">تسجيل</button>
</div>

<div class="card">
<h3>تسجيل دخول / Login</h3>
<input id="loginEmail" placeholder="البريد الإلكتروني">
<input id="loginPass" type="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
</div>

<div class="card" id="adminPanel" style="display:none">
<h3>لوحة الأدمن</h3>
<div id="users"></div>
</div>

<script>
let users=JSON.parse(localStorage.getItem("users")||"[]");

function save(){
localStorage.setItem("users",JSON.stringify(users));
}

function register(){
let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

if(!name || !email || !pass){
alert("عبئ جميع البيانات");
return;
}

if(users.find(x=>x.email===email)){
alert("هذا البريد مسجل مسبقًا");
return;
}

users.push({name,email,pass,status:"pending",role:"pending"});
save();
alert("تم إرسال طلبك للإدارة");
}

function login(){
let email=document.getElementById("loginEmail").value;
let pass=document.getElementById("loginPass").value;

if(email==="cccoccc15@hotmail.com"){
document.getElementById("adminPanel").style.display="block";
renderUsers();
return;
}

let u=users.find(x=>x.email===email);

if(!u){
alert("الحساب غير موجود");
return;
}

if(u.pass!==pass){
alert("كلمة المرور غير صحيحة");
return;
}

if(u.status==="blocked"){
alert("هذا الحساب محظور");
return;
}

if(u.status!=="approved"){
alert("حسابك بانتظار موافقة الإدارة");
return;
}

alert("تم الدخول بنجاح");
}

function renderUsers(){
let html="";
users.forEach(u=>{
html+=`
<div style="border:1px solid #ddd;padding:10px;margin:8px;border-radius:10px">
<b>${u.name}</b><br>
${u.email}<br>
الحالة: ${u.status}<br>
الدور: ${u.role}<br>
<button onclick="approve('${u.email}')">موافقة كمفتش</button>
<button onclick="makeSupervisor('${u.email}')">ترقية مشرف</button>
<button onclick="makeViewer('${u.email}')">مشاهدة فقط</button>
<button onclick="block('${u.email}')">حظر</button>
</div>
`;
});
document.getElementById("users").innerHTML=html;
}

function approve(email){
let u=users.find(x=>x.email===email);
u.status="approved";
u.role="inspector";
save();
renderUsers();
}

function makeSupervisor(email){
let u=users.find(x=>x.email===email);
u.status="approved";
u.role="supervisor";
save();
renderUsers();
}

function makeViewer(email){
let u=users.find(x=>x.email===email);
u.status="approved";
u.role="viewer";
save();
renderUsers();
}

function block(email){
let u=users.find(x=>x.email===email);
u.status="blocked";
u.role="blocked";
save();
renderUsers();
}
</script>

</body>
</html>
